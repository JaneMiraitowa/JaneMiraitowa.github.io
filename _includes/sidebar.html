<!-- 作者信息卡：已替换头像+个性化简介 -->
<div class="widget author-card">
    <!-- 👇 这里是头像地址，你可以改成你的真实头像链接 -->
    < img class="author-avatar" src="/assets/images/avatar.jpg" alt="我的头像">
    
    <!-- 👇 这里是你的昵称 -->
    <h3 class="author-name">JaneMiraitowa</h3>
    
    <!-- 👇 这里是你的个性化简介，可自由修改 -->
    <p class="author-bio">不断学习<br>热爱技术与生活 ✨<br>保持热爱 奔赴山海 🚀</p >
    
    <!-- 统计数据：自动获取文章数 -->
    <div class="author-stats">
        <div class="stat-item">
            <span class="stat-num">{{ site.posts | size }}</span>
            <p class="stat-label">文章数</p >
        </div>
        <div class="stat-item">
            <span class="stat-num">5</span>
            <p class="stat-label">评论量</p >
        </div>
    </div>
</div>

<!-- 人生倒计时：保留自动更新功能 -->
<div class="widget countdown-widget">
    <h4 class="widget-title">人生时间进度</h4>
    
    <div class="countdown-item">
        <p>今日已过去 <span id="td">0%</span></p >
        <div class="progress-bar">
            <div class="bar-fill today" style="width:0%"></div>
        </div>
    </div>
    
    <div class="countdown-item">
        <p>本周已过去 <span id="wk">0%</span></p >
        <div class="progress-bar">
            <div class="bar-fill week" style="width:0%"></div>
        </div>
    </div>
    
    <div class="countdown-item">
        <p>本月已过去 <span id="mt">0%</span></p >
        <div class="progress-bar">
            <div class="bar-fill month" style="width:0%"></div>
        </div>
    </div>
    
    <div class="countdown-item">
        <p>本年已过去 <span id="yr">0%</span></p >
        <div class="progress-bar">
            <div class="bar-fill year" style="width:0%"></div>
        </div>
    </div>
</div>

<script>
// 倒计时逻辑：自动更新，不用手动改
function updateProgress() {
    let now = new Date();
    
    // 今日
    let todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    let todayPercent = ((now - todayStart) / 86400000 * 100).toFixed(1);
    
    // 本周
    let weekStart = new Date(todayStart);
    weekStart.setDate(todayStart.getDate() - todayStart.getDay());
    let weekPercent = ((now - weekStart) / 604800000 * 100).toFixed(1);
    
    // 本月
    let monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
    let monthPercent = ((now - monthStart) / (new Date(now.getFullYear(), now.getMonth()+1, 1) - monthStart) * 100).toFixed(1);
    
    // 本年
    let yearStart = new Date(now.getFullYear(), 0, 1);
    let yearPercent = ((now - yearStart) / (new Date(now.getFullYear()+1, 0, 1) - yearStart) * 100).toFixed(1);

    // 更新显示
    document.querySelector('.today').style.width = todayPercent + "%";
    document.querySelector('.week').style.width = weekPercent + "%";
    document.querySelector('.month').style.width = monthPercent + "%";
    document.querySelector('.year').style.width = yearPercent + "%";
    
    document.getElementById("td").innerText = todayPercent + "%";
    document.getElementById("wk").innerText = weekPercent + "%";
    document.getElementById("mt").innerText = monthPercent + "%";
    document.getElementById("yr").innerText = yearPercent + "%";
}

// 初始化+每秒刷新
updateProgress();
setInterval(updateProgress, 1000);
</script>
