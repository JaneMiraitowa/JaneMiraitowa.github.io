<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ site.title }}</title>
    <style>
        /* 简单美化样式，不用改 */
        body { font-family: 微软雅黑, sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; line-height: 1.6; }
        header { border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 20px; }
        a { color: #0366d6; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <header>
        <h1><a href=" ">{{ site.title }}</a ></h1>
        <p>{{ site.description }}</p >
    </header>
    <main>
        {{ content }}
    </main>
    <footer style="margin-top: 50px; padding-top: 20px; border-top: 1px solid #eee; color: #666;">
        <p>© {{ site.time | date: '%Y' }} {{ site.title }}. Powered by GitHub Pages & Jekyll</p >
    </footer>
</body>
</html>
