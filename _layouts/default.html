<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Microsoft YaHei",sans-serif;line-height:1.6;color:#333;background:#f8f9fa}
.container{max-width:900px;margin:0 auto;padding:0 20px}
header{background:#0366d6;color:white;padding:1rem 0;margin-bottom:2rem;box-shadow:0 2px 4px #0000001a}
.nav-container{display:flex;justify-content:space-between;align-items:center}
.site-title{font-size:1.5rem;font-weight:bold;color:white;text-decoration:none}
.nav-links{list-style:none;display:flex;gap:1.5rem}
.nav-links a{color:white;text-decoration:none}
.nav-links a:hover{opacity:.8}
main{background:white;padding:2rem;border-radius:8px;box-shadow:0 2px 8px #00000008}
.post-list{list-style:none}
.post-list li{margin-bottom:2rem;padding-bottom:1rem;border-bottom:1px solid #eee}
.post-link{color:#0366d6;text-decoration:none;font-size:1.3rem;font-weight:bold}
.post-meta{color:#6a737d;font-size:.9rem;margin:.5rem 0}
.post-categories a{background:#e1ecf4;color:#0366d6;padding:.2rem .5rem;border-radius:4px;font-size:.8rem;margin-right:.3rem;text-decoration:none}
.pagination{margin-top:2rem;text-align:center}
.pagination a,.pagination em{padding:.5rem .8rem;margin:0 .2rem;border:1px solid #ddd;border-radius:4px;text-decoration:none;color:#0366d6}
.pagination em{background:#0366d6;color:white}
footer{text-align:center;padding:2rem 0;color:#6a737d;margin-top:2rem;border-top:1px solid #eee}
@media(max-width:768px){.nav-container{flex-direction:column;gap:1rem}}
</style>
</head>
<body>
<header>
  <div class="container nav-container">
    <a href=" '/' | relative_url }}" class="site-title">{{ site.title }}</a >
    <nav>
      <ul class="nav-links">
        {% for item in site.navigation %}
        <li><a href="{{ item.url }}">{{ item.name }}</a ></li>
        {% endfor %}
      </ul>
    </nav>
  </div>
</header>
<main class="container">
  {{ content }}
</main>
<footer class="container">
  <p>© {{ site.time | date: '%Y' }} {{ site.title }}. Powered by GitHub Pages</p >
</footer>
</body>
</html>
