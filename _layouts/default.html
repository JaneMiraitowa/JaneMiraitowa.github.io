<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
  <header class="header">
    <div class="nav-container">
      <div class="logo">
        <i class="fa-solid fa-code"></i>
        <span>Jane的个人博客</span>
      </div>
      <nav class="nav-links">
        <a href=" ">首页</a >
        <a href="/category/生活日常/">生活日常</a >
        <a href="/category/技术笔记/">技术笔记</a >
        <a href="/about.html">关于我</a >
        <button id="darkModeToggle" class="dark-mode-btn">🌙 暗黑模式</button>
      </nav>
    </div>
  </header>

  <div class="container">
    <main class="main-content">
      {{ content }}
    </main>
    <aside class="sidebar">
      {% include sidebar.html %}
    </aside>
  </div>

  <footer class="footer">
    <p>© {{ site.time | date: "%Y" }} Jane的个人博客 | Powered by Jekyll & GitHub Pages</p >
  </footer>
  
<script>
  // 获取按钮元素
  const toggleBtn = document.getElementById('darkModeToggle');
  
  // 点击按钮切换暗黑模式
  toggleBtn.addEventListener('click', () => {
    document.body.classList.toggle('dark-mode');
    // 记住用户的选择，刷新页面不失效
    localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
    // 切换按钮文字
    if (document.body.classList.contains('dark-mode')) {
      toggleBtn.textContent = '☀️ 浅色模式';
    } else {
      toggleBtn.textContent = '🌙 暗黑模式';
    }
  });

  // 页面加载时，自动应用用户之前的选择
  if (localStorage.getItem('darkMode') === 'true') {
    document.body.classList.add('dark-mode');
    toggleBtn.textContent = '☀️ 浅色模式';
  }
</script>

</body>
</html>
