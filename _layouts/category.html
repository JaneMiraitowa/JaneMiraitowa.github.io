---
layout: default
---
<h1>{{ page.category }} 分类下的文章</h1>
<ul class="post-list">
{% for post in page.posts %}
  <li>
    <h2><a class="post-link" href=" ">{{ post.title }}</a ></h2>
    <span class="post-meta">{{ post.date | date: "%Y年%m月%d日" }}</span>
    <p>{{ post.excerpt | strip_html | truncatewords:30 }}</p >
  </li>
{% endfor %}
</ul>
