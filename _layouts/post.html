---
layout: default
---
<article>
  <h1 style="font-size:24px;margin-bottom:10px">{{ page.title }}</h1>
  <div class="post-meta">
    {{ page.date | date: "%Y年%m月%d日" }}
    {% for cat in page.categories %}
    <span class="post-cate">{{ cat }}</span>
    {% endfor %}
  </div>
  <div style="margin-top:20px;line-height:1.9;font-size:16px">
    {{ content }}
  </div>
</article>

<!-- 评论区 -->
<div class="card" style="margin-top:24px">
  <h3 style="margin-bottom:16px">💬 评论区</h3>
  <div id="gitalk-container"></div>
</div>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/gitalk@1/dist/gitalk.css">
<script src="https://cdn.jsdelivr.net/npm/gitalk@1/dist/gitalk.min.js"></script>
<script>
var gitalk = new Gitalk({
  clientID: '',
  clientSecret: '',
  repo: 'JaneMiraitowa.github.io',
  owner: 'JaneMiraitowa',
  admin: ['JaneMiraitowa'],
  id: location.pathname,
  distractionFreeMode: true
});
gitalk.render('gitalk-container');
</script>
